<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>URL 可访问性检测</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header span { color: #7c83fd; }

    .main {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
    }

    /* 左侧面板 */
    .left {
      width: 380px;
      min-width: 280px;
      background: #fff;
      border-right: 1px solid #dde1ea;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 14px;
    }

    .left label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .left textarea {
      flex: 1;
      resize: none;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      font-family: "SF Mono", "Fira Code", monospace;
      line-height: 1.7;
      color: #222;
      outline: none;
      transition: border-color .2s;
    }

    .left textarea:focus { border-color: #7c83fd; }

    .hint {
      font-size: 12px;
      color: #999;
      line-height: 1.5;
    }

    .btn-group { display: flex; gap: 8px; }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }

    #btnCheck {
      background: #7c83fd;
      color: #fff;
    }

    #btnClear {
      background: #f3f4f6;
      color: #555;
    }

    /* 右侧面板 */
    .right {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .empty {
      margin: auto;
      text-align: center;
      color: #bbb;
    }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    .summary-bar {
      background: #fff;
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: #555;
      border: 1px solid #e5e7eb;
    }

    .summary-bar b { font-size: 20px; font-weight: 700; }
    .s-ok { color: #16a34a; }
    .s-fail { color: #dc2626; }
    .s-warn { color: #d97706; }

    .results { display: flex; flex-direction: column; gap: 8px; }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #e5e7eb;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    .card .badge {
      min-width: 80px;
      text-align: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge.ok    { background: #dcfce7; color: #16a34a; }
    .badge.fail  { background: #fee2e2; color: #dc2626; }
    .badge.cors  { background: #fef3c7; color: #d97706; }
    .badge.pending { background: #f3f4f6; color: #999; }

    .card .url {
      flex: 1;
      font-size: 13px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: #333;
      word-break: break-all;
    }

    .card .info {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
    }

    .progress {
      height: 3px;
      background: #e5e7eb;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #7c83fd;
      transition: width .3s;
    }
  </style>
</head>
<body>

<header>
  <span>&#9679;</span> URL 可访问性批量检测
</header>

<div class="main">
  <!-- 左侧 -->
  <div class="left">
    <label>粘贴 URL 列表</label>
    <textarea id="urlInput" placeholder="https://example.com
https://google.com
https://github.com

支持换行或 / 分隔"></textarea>
    <p class="hint">每行一个，或用 <code>/</code> 分隔。自动补全 https:// 前缀。</p>
    <div class="progress" id="progressWrap" style="display:none">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="btn-group">
      <button id="btnCheck" onclick="startCheck()">&#9654; 开始检测</button>
      <button id="btnClear" onclick="clearAll()">&#10005; 清空</button>
    </div>
  </div>

  <!-- 右侧 -->
  <div class="right" id="right">
    <div class="empty" id="emptyState">
      <div class="icon">&#128269;</div>
      <p>在左侧贴入 URL，点击「开始检测」</p>
    </div>
  </div>
</div>

<script>
  let controller = null;

  function parseURLs(raw) {
    return raw
      .split(/[\n\/]+/)
      .map(s => s.trim())
      .filter(Boolean)
      .map(u => /^https?:\/\//i.test(u) ? u : 'https://' + u);
  }

  async function checkURL(url) {
    const start = Date.now();
    try {
      const resp = await fetch(url, {
        method: 'HEAD',
        mode: 'no-cors',
        signal: AbortSignal.timeout(8000),
      });
      const ms = Date.now() - start;
      // no-cors 返回 opaque，status 为 0 但 promise resolved → 可达
      return { status: 'cors', label: '可访问*', ms };
    } catch (e) {
      const ms = Date.now() - start;
      if (e.name === 'AbortError' || e.name === 'TimeoutError') {
        return { status: 'fail', label: '超时', ms };
      }
      // TypeError: network error → 真正不可达
      return { status: 'fail', label: '不可达', ms };
    }
  }

  function makeCard(url) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <span class="badge pending">检测中…</span>
      <span class="url">${escHtml(url)}</span>
      <span class="info">—</span>
    `;
    return card;
  }

  function updateCard(card, result) {
    const badge = card.querySelector('.badge');
    const info  = card.querySelector('.info');
    badge.className = 'badge ' + result.status;
    badge.textContent = result.label;
    info.textContent = result.ms + ' ms';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function startCheck() {
    const raw = document.getElementById('urlInput').value.trim();
    if (!raw) return;

    const urls = parseURLs(raw);
    if (!urls.length) return;

    // reset
    const right = document.getElementById('right');
    right.innerHTML = '';

    // summary bar
    const bar = document.createElement('div');
    bar.className = 'summary-bar';
    bar.id = 'summaryBar';
    bar.innerHTML = `
      <div>共 <b>${urls.length}</b> 个</div>
      <div class="s-ok">可访问 <b id="cOk">0</b></div>
      <div class="s-fail">不可达 <b id="cFail">0</b></div>
      <div class="s-warn">CORS限制* <b id="cCors">0</b></div>
    `;
    right.appendChild(bar);

    // results container
    const container = document.createElement('div');
    container.className = 'results';
    right.appendChild(container);

    // progress
    const pw = document.getElementById('progressWrap');
    const pb = document.getElementById('progressBar');
    pw.style.display = 'block';

    // build cards first
    const cards = urls.map(url => {
      const card = makeCard(url);
      container.appendChild(card);
      return { url, card };
    });

    let ok = 0, fail = 0, cors = 0, done = 0;

    // check concurrently (max 5)
    const CONCURRENCY = 5;
    let idx = 0;

    async function worker() {
      while (idx < cards.length) {
        const i = idx++;
        const { url, card } = cards[i];
        const result = await checkURL(url);
        updateCard(card, result);
        if (result.status === 'cors') cors++;
        else if (result.status === 'ok') ok++;
        else fail++;
        done++;
        document.getElementById('cOk').textContent   = ok + cors;
        document.getElementById('cFail').textContent  = fail;
        document.getElementById('cCors').textContent  = cors;
        pb.style.width = (done / urls.length * 100) + '%';
      }
    }

    const workers = Array.from({ length: Math.min(CONCURRENCY, urls.length) }, worker);
    await Promise.all(workers);

    pw.style.display = 'none';
    pb.style.width = '0%';

    // add footnote
    const note = document.createElement('p');
    note.style.cssText = 'font-size:12px;color:#aaa;padding:4px 0';
    note.textContent = '* 浏览器安全策略限制，无法获取精确状态码，但服务器有响应即视为可访问。';
    right.appendChild(note);
  }

  function clearAll() {
    document.getElementById('urlInput').value = '';
    const right = document.getElementById('right');
    right.innerHTML = `
      <div class="empty" id="emptyState">
        <div class="icon">&#128269;</div>
        <p>在左侧贴入 URL，点击「开始检测」</p>
      </div>`;
    document.getElementById('progressWrap').style.display = 'none';
  }
</script>
</body>
</html>
