<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>URL Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --border: #e8eaed;
      --text: #1a1b1e;
      --muted: #8a8f9c;
      --accent: #5b5ef4;
      --red: #e5484d;
      --green: #30a46c;
      --tg: #229ED9;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text);
      font-size: 14px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo {
      width: 22px; height: 22px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 12px; height: 12px; fill: #fff; }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.2px;
    }

    header .spacer { flex: 1; }

    .btn-settings {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-settings:hover { border-color: var(--accent); color: var(--accent); background: #f0f0ff; }
    .btn-settings .pip {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #d1d5db;
      transition: background .2s;
    }
    .btn-settings.configured .pip { background: var(--green); }

    /* ── Main Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left Panel ── */
    .left {
      width: 340px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-section {
      display: flex;
      flex-direction: column;
      padding: 16px 18px;
      gap: 8px;
    }

    .panel-section + .panel-section {
      border-top: 1px solid var(--border);
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    textarea {
      resize: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus { border-color: var(--accent); background: #fff; }
    textarea::placeholder { color: #c0c4cf; }

    #noteInput {
      height: 90px;
      font-family: inherit;
    }

    .url-section {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 16px 18px;
      gap: 8px;
      border-top: 1px solid var(--border);
    }

    #urlInput { flex: 1; font-family: "SF Mono", "Fira Code", monospace; font-size: 12.5px; }

    /* ── Action Bar ── */
    .action-bar {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-row { display: flex; gap: 8px; }

    button {
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 14px;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .5; cursor: default; transform: none; }

    .btn-primary { background: var(--accent); color: #fff; flex: 1; }
    .btn-ghost   { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

    .btn-tg {
      background: var(--tg);
      color: #fff;
      width: 100%;
      display: none;
    }

    .progress-wrap {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width .25s;
    }

    /* ── Right Panel ── */
    .right {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: #c8cbd6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .empty-state svg { width: 40px; height: 40px; opacity: .4; }
    .empty-state p { font-size: 13px; }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-card .num {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
    }
    .stat-card .lbl {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .stat-card.total .num { color: var(--text); }
    .stat-card.ok    .num { color: var(--green); }
    .stat-card.fail  .num { color: var(--red); }

    /* Failed list */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      padding-bottom: 2px;
    }

    .result-list { display: flex; flex-direction: column; gap: 6px; }

    .result-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: up .18s ease;
    }
    @keyframes up { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }

    .result-item .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.ok   { background: var(--green); }
    .status-dot.fail { background: var(--red); }
    .status-dot.cors { background: #f59e0b; }
    .status-dot.pending { background: var(--border); }

    .result-item .url-text {
      flex: 1;
      font-size: 12.5px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--text);
      word-break: break-all;
      line-height: 1.4;
    }

    .result-item .meta {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .result-item.is-fail {
      border-color: #fecdd3;
      background: #fff8f8;
    }
    .result-item.is-fail .url-text { color: var(--red); }

    /* checking animation */
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    .status-dot.pending { animation: pulse 1.2s infinite; }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 14px;
      width: 400px;
      max-width: 94vw;
      box-shadow: 0 24px 64px rgba(0,0,0,.18);
      animation: popIn .18s ease;
      overflow: hidden;
    }
    @keyframes popIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }

    .modal-head {
      padding: 20px 22px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .modal-head h2 { font-size: 14px; font-weight: 700; }

    .modal-x {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field-lbl { font-size: 12px; font-weight: 600; color: var(--text); }
    .field-sub { font-size: 11px; color: var(--muted); }

    .field input {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }

    .modal-msg {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      display: none;
      font-weight: 500;
    }
    .modal-msg.ok  { display: block; background: #e8f7ee; color: var(--green); }
    .modal-msg.err { display: block; background: #fef0f0; color: var(--red); }

    .modal-foot {
      padding: 14px 22px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .btn-test { background: var(--bg); color: var(--text); border: 1px solid var(--border); font-size: 12px; }
    .btn-save { background: var(--accent); color: #fff; flex: 1; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 12 12"><circle cx="6" cy="6" r="5"/></svg>
  </div>
  <h1>URL Checker</h1>
  <div class="spacer"></div>
  <button class="btn-settings" id="btnSettings" onclick="openModal()">
    <span class="pip"></span>
    Telegram
  </button>
</header>

<div class="layout">

  <!-- Left -->
  <div class="left">

    <div class="panel-section">
      <div class="section-label">Note</div>
      <textarea id="noteInput" placeholder="Add a message to include in the Telegram report…"></textarea>
    </div>

    <div class="url-section">
      <div class="section-label">URLs</div>
      <textarea id="urlInput" placeholder="https://example.com&#10;https://google.com&#10;&#10;One per line, or separate with /"></textarea>
    </div>

    <div class="action-bar">
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="startCheck()">Run Check</button>
        <button class="btn-ghost" onclick="clearAll()">Clear</button>
      </div>
      <button class="btn-tg" id="btnTelegram" onclick="sendReport()">Send to Telegram</button>
    </div>

  </div>

  <!-- Right -->
  <div class="right" id="right">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>Paste URLs on the left and run a check</p>
    </div>
  </div>

</div>

<!-- Settings Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <h2>Telegram Settings</h2>
      <button class="modal-x" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <div class="field-lbl">Bot Token</div>
        <input id="tgToken" type="password" placeholder="123456789:ABCdef…" autocomplete="off">
        <div class="field-sub">Get from @BotFather</div>
      </div>
      <div class="field">
        <div class="field-lbl">Chat ID</div>
        <input id="tgChatId" type="text" placeholder="-1001234567890">
        <div class="field-sub">Group IDs start with −. Add the bot to the group first.</div>
      </div>
      <div class="modal-msg" id="modalMsg"></div>
    </div>
    <div class="modal-foot">
      <button class="btn-test" onclick="testTg()">Send test message</button>
      <button class="btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
  let lastResults = [];

  // ── Boot ────────────────────────────────────────────────
  addEventListener('DOMContentLoaded', () => {
    document.getElementById('tgToken').value  = localStorage.getItem('tg_token')   || '';
    document.getElementById('tgChatId').value = localStorage.getItem('tg_chat_id') || '';
    refreshIndicator();
  });

  function refreshIndicator() {
    const ok = !!(localStorage.getItem('tg_token') && localStorage.getItem('tg_chat_id'));
    document.getElementById('btnSettings').classList.toggle('configured', ok);
  }

  // ── Modal ────────────────────────────────────────────────
  function openModal() {
    document.getElementById('tgToken').value  = localStorage.getItem('tg_token')   || '';
    document.getElementById('tgChatId').value = localStorage.getItem('tg_chat_id') || '';
    setMsg('', '');
    document.getElementById('overlay').classList.add('open');
  }
  function closeModal() { document.getElementById('overlay').classList.remove('open'); }
  function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

  function saveModal() {
    const token  = document.getElementById('tgToken').value.trim();
    const chatId = document.getElementById('tgChatId').value.trim();
    if (!token || !chatId) { setMsg('err', 'Both fields are required.'); return; }
    localStorage.setItem('tg_token',   token);
    localStorage.setItem('tg_chat_id', chatId);
    refreshIndicator();
    setMsg('ok', 'Saved.');
    setTimeout(closeModal, 700);
  }

  async function testTg() {
    const token  = document.getElementById('tgToken').value.trim();
    const chatId = document.getElementById('tgChatId').value.trim();
    if (!token || !chatId) { setMsg('err', 'Fill in both fields first.'); return; }
    const btn = document.querySelector('.btn-test');
    btn.textContent = 'Sending…'; btn.disabled = true;
    setMsg('', '');
    try {
      const r = await tgPost(token, chatId, '✅ URL Checker — connection test successful.');
      r.ok ? setMsg('ok', 'Test message sent!') : setMsg('err', r.description || 'Failed.');
    } catch { setMsg('err', 'Network error.'); }
    btn.textContent = 'Send test message'; btn.disabled = false;
  }

  function setMsg(type, text) {
    const el = document.getElementById('modalMsg');
    el.className = 'modal-msg' + (type ? ' ' + type : '');
    el.textContent = text;
  }

  // ── Check ────────────────────────────────────────────────
  function parseURLs(raw) {
    return [...new Set(
      raw.split(/[\n/]+/)
        .map(s => s.trim())
        .filter(Boolean)
        .map(u => /^https?:\/\//i.test(u) ? u : 'https://' + u)
    )];
  }

  async function checkURL(url) {
    const t = Date.now();
    try {
      await fetch(url, { method: 'HEAD', mode: 'no-cors', signal: AbortSignal.timeout(8000) });
      return { ok: true, ms: Date.now() - t };
    } catch (e) {
      return { ok: false, ms: Date.now() - t, reason: (e.name === 'AbortError' || e.name === 'TimeoutError') ? 'Timeout' : 'Unreachable' };
    }
  }

  async function startCheck() {
    const raw = document.getElementById('urlInput').value.trim();
    if (!raw) return;
    const urls = parseURLs(raw);
    if (!urls.length) return;

    lastResults = [];
    document.getElementById('btnTelegram').style.display = 'none';

    const right = document.getElementById('right');
    right.innerHTML = '';

    // Stats row (starts at 0)
    const statsRow = el('div', 'stats-row');
    statsRow.innerHTML = `
      <div class="stat-card total"><div class="num" id="sTotal">${urls.length}</div><div class="lbl">Total</div></div>
      <div class="stat-card ok">  <div class="num" id="sOk">0</div>   <div class="lbl">Accessed</div></div>
      <div class="stat-card fail"><div class="num" id="sFail">0</div> <div class="lbl">Failed</div></div>`;
    right.appendChild(statsRow);

    // Result list
    const listWrap = el('div');
    const listTitle = el('div', 'section-title');
    listTitle.textContent = 'Results';
    const list = el('div', 'result-list');
    listWrap.append(listTitle, list);
    right.appendChild(listWrap);

    // Build pending rows
    const rows = urls.map(url => {
      const item = el('div', 'result-item');
      item.innerHTML = `<span class="status-dot pending"></span>
        <span class="url-text">${esc(url)}</span>
        <span class="meta">—</span>`;
      list.appendChild(item);
      return { url, item };
    });

    const pw = document.getElementById('progressWrap');
    const pb = document.getElementById('progressBar');
    pw.style.display = 'block';

    let okCount = 0, failCount = 0, done = 0, idx = 0;

    async function worker() {
      while (idx < rows.length) {
        const i = idx++;
        const { url, item } = rows[i];
        const res = await checkURL(url);
        lastResults.push({ url, ...res });

        const dot  = item.querySelector('.status-dot');
        const meta = item.querySelector('.meta');
        dot.className = 'status-dot ' + (res.ok ? 'cors' : 'fail');
        meta.textContent = res.ms + ' ms' + (res.ok ? '' : ' · ' + res.reason);

        if (res.ok) {
          okCount++;
        } else {
          failCount++;
          item.classList.add('is-fail');
        }

        done++;
        document.getElementById('sOk').textContent   = okCount;
        document.getElementById('sFail').textContent = failCount;
        pb.style.width = (done / urls.length * 100) + '%';
      }
    }

    await Promise.all(Array.from({ length: Math.min(6, urls.length) }, worker));

    pw.style.display = 'none';
    pb.style.width = '0%';
    document.getElementById('btnTelegram').style.display = 'block';
  }

  // ── Telegram ─────────────────────────────────────────────
  async function sendReport() {
    const token  = localStorage.getItem('tg_token')   || '';
    const chatId = localStorage.getItem('tg_chat_id') || '';
    if (!token || !chatId) { openModal(); setMsg('err', 'Save your credentials first.'); return; }
    if (!lastResults.length) return;

    const note    = document.getElementById('noteInput').value.trim();
    const total   = lastResults.length;
    const okList  = lastResults.filter(r => r.ok);
    const failList= lastResults.filter(r => !r.ok);

    let msg = '';
    if (note) msg += note + '\n\n';
    msg += `Total Tested: ${total}\n`;
    msg += `Accessed: ${okList.length}\n`;
    msg += `Failed: ${failList.length}`;
    if (failList.length) {
      msg += '\n\nFailed URLs:\n' + failList.map(r => r.url).join('\n');
    }

    const btn = document.getElementById('btnTelegram');
    btn.textContent = 'Sending…'; btn.disabled = true;

    try {
      const data = await tgPost(token, chatId, msg);
      if (data.ok) {
        btn.textContent = '✓ Sent';
        setTimeout(() => { btn.textContent = 'Send to Telegram'; btn.disabled = false; }, 2000);
      } else {
        alert('Error: ' + (data.description || JSON.stringify(data)));
        btn.textContent = 'Send to Telegram'; btn.disabled = false;
      }
    } catch (e) {
      alert('Network error: ' + e.message);
      btn.textContent = 'Send to Telegram'; btn.disabled = false;
    }
  }

  async function tgPost(token, chatId, text) {
    const r = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chatId, text }),
    });
    return r.json();
  }

  // ── Helpers ──────────────────────────────────────────────
  function clearAll() {
    document.getElementById('urlInput').value  = '';
    document.getElementById('noteInput').value = '';
    document.getElementById('btnTelegram').style.display = 'none';
    lastResults = [];
    document.getElementById('right').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>Paste URLs on the left and run a check</p>
      </div>`;
    document.getElementById('progressWrap').style.display = 'none';
  }

  function el(tag, cls) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    return e;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
